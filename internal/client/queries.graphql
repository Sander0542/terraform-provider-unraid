query GetVersion {
  info {
    versions {
      core {
        unraid
        api
        kernel
      }
    }
  }
}

query GetShares {
  shares {
    name
    free
    used
    size
    include
    exclude
    cache
    nameOrig
    comment
    allocator
    splitLevel
    floor
    cow
    color
    luksStatus
  }
}
